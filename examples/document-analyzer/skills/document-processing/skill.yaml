      - "summarize"
      - "what is this about"
      - "key points"
    medium:
      - "extract information"
      - "identify topics"
      - "list dates"
      - "find numbers"
    complex:
      - "cross reference"
      - "compare documents"
      - "multi-section analysis"
      - "audit trail"
